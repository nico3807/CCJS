# Déploiement automatique de Code Coach sur GitHub Pages
# (site 100 % statique : aucune étape de build nécessaire)
name: Déployer sur GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Vérification de la syntaxe JavaScript
        run: |
          node --check script.js
          node --check certificate.js
          node --check tempo.js
          node --check cloudflare-worker/worker.js

  deploy:
    # Le déploiement ne part que depuis main (les PR ne lancent que les tests)
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
